<!DOCTYPE html>
<html>
<head>

    <title>Analytics</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">
        Transformer Analytics
    </h2>

    <div class="row">

        <div class="col-md-3">
            <div class="card shadow">
                <div class="card-body text-center">
                    <h5>Avg Temperature</h5>
                    <h2 id="avgTemp">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow">
                <div class="card-body text-center">
                    <h5>Max Temperature</h5>
                    <h2 id="maxTemp">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow">
                <div class="card-body text-center">
                    <h5>Avg Voltage</h5>
                    <h2 id="avgVoltage">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow">
                <div class="card-body text-center">
                    <h5>Fault %</h5>
                    <h2 id="faultPercent">0%</h2>
                </div>
            </div>
        </div>

    </div>
    <div class="row mt-4">

    <div class="col-md-12">

        <div class="card shadow">

            <div class="card-body">

                <h4 class="text-center">
                    Temperature Trend
                </h4>

                <canvas id="trendChart"></canvas>

            </div>

        </div>

    </div>

</div>

    <a href="index.html" class="btn btn-primary mt-4">
        Back to Dashboard
    </a>

</div>

<script src="analytics.js"></script>

</body>
</html>
